<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lỗi - Course System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-card { border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 600px; width: 100%; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card error-card">
            <div class="card-body">
                <h1 class="card-title text-danger">Oops! Có lỗi xảy ra</h1>
                <p class="card-text">Trang bạn tìm kiếm không tồn tại hoặc có lỗi.</p>
                <a href="/home" class="btn btn-primary">Về Trang Chủ</a>
                <a href="/login" class="btn btn-secondary ms-2">Đăng Nhập</a>
            </div>
        </div>
    </div>
</body>
</html>
