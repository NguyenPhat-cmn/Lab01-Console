<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${course.id != null} ? 'Sửa Học Phần' : 'Thêm Học Phần'">Thêm Học Phần</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; }
        .navbar-custom { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card { border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="/home"><i class="fas fa-graduation-cap"></i> Course System - Admin</a>
            <div class="d-flex">
                <a class="btn btn-outline-light me-2" href="/admin/courses">Quay Lại</a>
                <form class="d-inline" action="/logout" method="post">
                    <button class="btn btn-outline-light" type="submit">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container main-container">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 th:text="${course.id != null} ? 'Sửa Học Phần' : 'Thêm Học Phần Mới'"></h4>
            </div>
            <div class="card-body">
                <form th:action="${course.id != null} ? @{/admin/courses} : @{/admin/courses}" method="post" enctype="multipart/form-data" th:object="${course}">
                    <input type="hidden" th:field="*{id}" />
                    <div class="mb-3">
                        <label for="name" class="form-label">Tên Học Phần</label>
                        <input type="text" class="form-control" id="name" th:field="*{name}" required>
                    </div>
                    <div class="mb-3">
                        <label for="credits" class="form-label">Số Tín Chỉ</label>
                        <input type="number" class="form-control" id="credits" th:field="*{credits}" required>
                    </div>
                    <div class="mb-3">
                        <label for="instructor" class="form-label">Giảng Viên</label>
                        <input type="text" class="form-control" id="instructor" th:field="*{instructor}" required>
                    </div>
                    <div class="mb-3">
                        <label for="imageFile" class="form-label">Hình Ảnh</label>
                        <input type="file" class="form-control" id="imageFile" name="imageFile" accept="image/*" th:required="${course.id == null}">
                        <div th:if="${course.imageUrl}" class="mt-2">
                            <img th:src="${course.imageUrl}" alt="Current Image" style="width: 100px; height: 100px; object-fit: cover;">
                            <small class="text-muted">Ảnh hiện tại (để trống để giữ nguyên)</small>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success">Lưu</button>
                    <a href="/admin/courses" class="btn btn-secondary">Hủy</a>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
