<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; }
        .navbar-custom { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card { border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .course-card { transition: transform 0.3s; }
        .course-card:hover { transform: translateY(-5px); }
        .search-bar { max-width: 400px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="/home"><i class="fas fa-graduation-cap"></i> Course System</a>
            <div class="d-flex">
                <form class="d-flex me-3" action="/courses/search" method="get">
                    <input class="form-control search-bar" type="search" name="name" placeholder="Tìm kiếm học phần..." aria-label="Search">
                    <button class="btn btn-outline-light ms-2" type="submit"><i class="fas fa-search"></i></button>
                </form>
                <span class="navbar-text me-3" sec:authorize="isAuthenticated()">
                    <span class="badge bg-light text-dark">Hi, <span sec:authentication="name"></span>!</span>
                </span>
                <a class="btn btn-outline-light me-2" href="/enroll/my-courses" sec:authorize="hasRole('STUDENT')">My Courses</a>
                <a class="btn btn-outline-light me-2" href="/admin/courses" sec:authorize="hasRole('ADMIN')">Admin</a>
                <form class="d-inline" action="/logout" method="post">
                    <button class="btn btn-outline-light" type="submit">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container main-container">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4><i class="fas fa-list"></i> Danh Sách Học Phần</h4>
                    </div>
                    <div class="card-body">
                        <div class="row" th:each="course : ${courses}">
                            <div class="col-md-6 mb-4">
                                <div class="card course-card h-100">
                                    <div class="row g-0">
                                        <div class="col-md-4">
                                            <img th:src="${course.imageUrl}" class="img-fluid rounded-start" alt="Course Image" style="height: 100%; object-fit: cover;">
                                        </div>
                                        <div class="col-md-8">
                                            <div class="card-body">
                                                <h5 class="card-title" th:text="${course.name}"></h5>
                                                <p class="card-text"><strong>Giảng viên:</strong> <span th:text="${course.instructor}"></span></p>
                                                <p class="card-text"><strong>Số tín chỉ:</strong> <span th:text="${course.credits}"></span></p>
                                                <form th:action="@{/enroll/{id}(id=${course.id})}" method="post" sec:authorize="hasRole('STUDENT')" class="d-inline">
                                                    <button type="submit" class="btn btn-success btn-sm">Enroll</button>
                                                </form>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <nav aria-label="Page navigation">
                            <ul class="pagination justify-content-center">
                                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                    <a class="page-link" th:href="@{/home(page=${currentPage - 1})}" aria-label="Previous">
                                        <span aria-hidden="true">&laquo;</span>
                                    </a>
                                </li>
                                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                                    <a class="page-link" th:href="@{/home(page=${i})}" th:text="${i + 1}"></a>
                                </li>
                                <li class="page-item" th:classappend="${currentPage + 1 == totalPages} ? 'disabled'">
                                    <a class="page-link" th:href="@{/home(page=${currentPage + 1})}" aria-label="Next">
                                        <span aria-hidden="true">&raquo;</span>
                                    </a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
